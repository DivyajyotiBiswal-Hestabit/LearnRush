services:
  client:
    build: ./client
    container_name: day2-client
    ports:
      - "3000:3000"
    depends_on:
      - server

  server:
    build: ./server
    container_name: day2-server
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/day2app
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: day2-mongo
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: