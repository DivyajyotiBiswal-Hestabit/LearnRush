version: "3.8"

services:

  mongo:
    image: mongo:6
    container_name: week5-mongo
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  backend1:
    build: .
    container_name: week5-backend1
    restart: always
    expose:
      - "3000"
    depends_on:
      - mongo

  backend2:
    build: .
    container_name: week5-backend2
    restart: always
    expose:
      - "3000"
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: week5-client
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend1
      - backend2

  nginx:
    image: nginx:alpine
    container_name: week5-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2
      - client

volumes:
  mongo-data: