logs:
  log_file: src/logs/pipeline.log

data:
  raw_path: src/data/raw/netflix_titles.csv
  processed_path: src/data/processed/final.csv

target_column: type

drop_columns:
  - show_id
  - title
  - description

outliers:
  threshold: 3

scaling:
  method: standard

split:
  train_size: 0.7
  val_size: 0.15
  test_size: 0.15

class_imbalance:
  use_smote: true